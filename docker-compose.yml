services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beautyathome}
      POSTGRES_USER: ${POSTGRES_USER:-beautyathome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beautyathome}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-beautyathome}:${POSTGRES_PASSWORD:-beautyathome}@postgres:5432/${POSTGRES_DB:-beautyathome}?schema=public
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
