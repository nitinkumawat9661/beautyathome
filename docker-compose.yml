services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beautyathome}
      POSTGRES_USER: ${POSTGRES_USER:-beautyathome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beautyathome}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-beautyathome}:${POSTGRES_PASSWORD:-beautyathome}@postgres:5432/${POSTGRES_DB:-beautyathome}?schema=public
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64:?JWT_PRIVATE_KEY_BASE64 must be set}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64:?JWT_PUBLIC_KEY_BASE64 must be set}
      JWT_KEY_ID: ${JWT_KEY_ID:-local-development}
      JWT_ISSUER: ${JWT_ISSUER:-beautyathome-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-beautyathome-web}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-2592000}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-bah_refresh}
      REFRESH_COOKIE_SAME_SITE: ${REFRESH_COOKIE_SAME_SITE:-lax}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      OTP_DELIVERY_MODE: ${OTP_DELIVERY_MODE:-development}
      OTP_DEV_CODE: ${OTP_DEV_CODE:-123456}
      OTP_CODE_LENGTH: ${OTP_CODE_LENGTH:-6}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-300}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_REQUEST_COOLDOWN_SECONDS: ${OTP_REQUEST_COOLDOWN_SECONDS:-60}
      OTP_HMAC_SECRET: ${OTP_HMAC_SECRET:?OTP_HMAC_SECRET must be set}
      SESSION_TOKEN_SECRET: ${SESSION_TOKEN_SECRET:?SESSION_TOKEN_SECRET must be set}
      PII_LOOKUP_SECRET: ${PII_LOOKUP_SECRET:?PII_LOOKUP_SECRET must be set}
      REQUEST_CONTEXT_SECRET: ${REQUEST_CONTEXT_SECRET:?REQUEST_CONTEXT_SECRET must be set}
      PII_ENCRYPTION_KEY_BASE64: ${PII_ENCRYPTION_KEY_BASE64:?PII_ENCRYPTION_KEY_BASE64 must be set}
      PII_ENCRYPTION_KEY_VERSION: ${PII_ENCRYPTION_KEY_VERSION:-local-v1}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
